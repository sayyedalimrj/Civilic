name: Deploy Civilic Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: civilic-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to alimirjafari.ir
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.CIVILIC_SSH_HOST }}
          port: ${{ secrets.CIVILIC_SSH_PORT }}
          username: ${{ secrets.CIVILIC_SSH_USER }}
          key: ${{ secrets.CIVILIC_SSH_KEY }}
          script: |
            sudo /usr/local/bin/deploy-civilic
